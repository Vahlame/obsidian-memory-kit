<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" role="img" aria-label="Diagrama: el agente habla con servidores MCP, que leen y escriben notas Markdown en tu vault git; un daemon sincroniza el vault con un remoto.">
  <title>Cómo fluye tu memoria: agente → MCP → vault Markdown + git</title>
  <style>
    :root{
      --bg:#f8fafc; --panel:#ffffff; --border:#d0d7de;
      --ink:#1f2937; --muted:#57606a; --pill:#f3f6fa;
      --line:#94a3b8; --agent:#6366f1; --mcp:#0ea5e9; --vault:#f59e0b;
      --daemon:#10b981; --remote:#64748b;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg:#0d1117; --panel:#161b22; --border:#30363d;
        --ink:#e6edf3; --muted:#9aa4b2; --pill:#0d1117;
        --line:#6e7681; --agent:#818cf8; --mcp:#38bdf8; --vault:#fbbf24;
        --daemon:#34d399; --remote:#94a3b8;
      }
    }
    .bg{fill:var(--bg);stroke:var(--border)}
    .card{fill:var(--panel);stroke:var(--border)}
    .pill{fill:var(--pill);stroke:var(--border)}
    .ttl{fill:var(--ink);font:600 15px ui-sans-serif,Segoe UI,Roboto,Helvetica,Arial}
    .h1{fill:var(--ink);font:700 25px ui-sans-serif,Segoe UI,Roboto,Helvetica,Arial}
    .sub{fill:var(--muted);font:400 14px ui-sans-serif,Segoe UI,Roboto,Helvetica,Arial}
    .txt{fill:var(--ink);font:400 13px ui-sans-serif,Segoe UI,Roboto,Helvetica,Arial}
    .mono{fill:var(--ink);font:500 12.5px ui-monospace,SFMono-Regular,Consolas,monospace}
    .mut{fill:var(--muted);font:400 12px ui-sans-serif,Segoe UI,Roboto,Helvetica,Arial}
    .lbl{fill:var(--muted);font:500 11.5px ui-sans-serif,Segoe UI,Roboto,Helvetica,Arial}
    .flow{stroke:var(--line);stroke-width:2.2;fill:none}
  </style>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--line)"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect x="1" y="1" width="958" height="518" rx="18" class="bg"/>

  <!-- heading -->
  <text x="40" y="52" class="h1">Cómo fluye tu memoria</text>
  <text x="41" y="78" class="sub">tu agente  ·  MCP (el puente)  ·  tus notas Markdown en git  —  todo local, todo tuyo</text>

  <!-- ============ TOP BAND: read / write path ============ -->

  <!-- Agent card -->
  <rect x="40" y="150" width="232" height="150" rx="12" class="card"/>
  <rect x="40" y="150" width="232" height="6" rx="3" fill="var(--agent)"/>
  <circle cx="70" cy="190" r="13" fill="none" stroke="var(--agent)" stroke-width="2.2"/>
  <circle cx="65" cy="188" r="2.2" fill="var(--agent)"/><circle cx="75" cy="188" r="2.2" fill="var(--agent)"/>
  <path d="M64 196 q6 4 12 0" stroke="var(--agent)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <text x="92" y="195" class="ttl">Tú + el agente</text>
  <text x="60" y="232" class="txt">Cursor</text>
  <text x="60" y="254" class="txt">Claude Code</text>
  <text x="60" y="276" class="mut">Copilot, Cline, Zed…</text>

  <!-- MCP card -->
  <rect x="364" y="138" width="232" height="174" rx="12" class="card"/>
  <rect x="364" y="138" width="232" height="6" rx="3" fill="var(--mcp)"/>
  <text x="384" y="178" class="ttl">MCP — el puente</text>
  <rect x="384" y="194" width="192" height="40" rx="9" class="pill"/>
  <rect x="384" y="194" width="5" height="40" rx="2.5" fill="var(--mcp)"/>
  <text x="400" y="212" class="mono">basic-memory</text>
  <text x="400" y="228" class="mut">leer · escribir notas</text>
  <rect x="384" y="244" width="192" height="48" rx="9" class="pill"/>
  <rect x="384" y="244" width="5" height="48" rx="2.5" fill="var(--mcp)"/>
  <text x="400" y="262" class="mono">obsidian-memory-hybrid</text>
  <text x="400" y="280" class="mut">léxica + semántica + grafo</text>

  <!-- Vault card -->
  <rect x="688" y="150" width="232" height="150" rx="12" class="card"/>
  <rect x="688" y="150" width="232" height="6" rx="3" fill="var(--vault)"/>
  <path d="M708 184 h16 l5 6 h14 a4 4 0 0 1 4 4 v22 a4 4 0 0 1 -4 4 h-35 a4 4 0 0 1 -4 -4 v-28 a4 4 0 0 1 4 -4 z" fill="none" stroke="var(--vault)" stroke-width="2.2"/>
  <text x="760" y="195" class="ttl">Tu vault</text>
  <text x="708" y="232" class="mono">START_HERE.md</text>
  <text x="708" y="254" class="mono">MEMORY.md</text>
  <text x="708" y="276" class="mono">PROJECTS/…</text>
  <text x="845" y="232" class="lbl">Markdown</text>
  <text x="869" y="276" class="lbl">+ git</text>

  <!-- arrows top band -->
  <line x1="272" y1="225" x2="356" y2="225" class="flow" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="314" y="216" class="lbl" text-anchor="middle">tool calls</text>
  <line x1="596" y1="225" x2="680" y2="225" class="flow" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="638" y="216" class="lbl" text-anchor="middle">archivos</text>

  <!-- FTS index attached to MCP -->
  <line x1="480" y1="312" x2="480" y2="340" class="flow"/>
  <rect x="364" y="340" width="232" height="34" rx="9" class="pill"/>
  <text x="480" y="361" class="mut" text-anchor="middle">índice FTS5 + vectores semánticos (local)</text>

  <!-- ============ BOTTOM BAND: sync path ============ -->

  <!-- Daemon card (under vault) -->
  <rect x="688" y="392" width="232" height="100" rx="12" class="card"/>
  <rect x="688" y="392" width="232" height="6" rx="3" fill="var(--daemon)"/>
  <text x="708" y="428" class="mono">obsidian-memoryd</text>
  <text x="708" y="450" class="mut">vigila el vault (watch)</text>
  <text x="708" y="470" class="mut">y hace git add/commit/push</text>

  <!-- Remote card -->
  <rect x="364" y="404" width="232" height="78" rx="12" class="card"/>
  <rect x="364" y="404" width="232" height="6" rx="3" fill="var(--remote)"/>
  <path d="M396 452 a13 13 0 0 1 2 -25 a16 16 0 0 1 30 4 a11 11 0 0 1 -3 21 z" fill="none" stroke="var(--remote)" stroke-width="2"/>
  <text x="446" y="440" class="ttl">git remote</text>
  <text x="446" y="462" class="mut">GitHub privado · backup</text>

  <!-- arrow vault <-> daemon (watch) -->
  <line x1="804" y1="300" x2="804" y2="392" class="flow" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="814" y="350" class="lbl">watch</text>

  <!-- arrow daemon -> remote (push/pull) -->
  <line x1="688" y1="443" x2="596" y2="443" class="flow" marker-start="url(#ah)" marker-end="url(#ah)"/>
  <text x="642" y="434" class="lbl" text-anchor="middle">push / pull</text>

  <!-- legend -->
  <circle cx="48" cy="500" r="5" fill="var(--agent)"/><text x="58" y="504" class="lbl">agente</text>
  <circle cx="150" cy="500" r="5" fill="var(--mcp)"/><text x="160" y="504" class="lbl">puente MCP</text>
  <circle cx="288" cy="500" r="5" fill="var(--vault)"/><text x="298" y="504" class="lbl">tus archivos</text>
  <circle cx="430" cy="500" r="5" fill="var(--daemon)"/><text x="440" y="504" class="lbl">sincronización</text>
</svg>
