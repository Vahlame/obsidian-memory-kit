[project]
name = "obsidian-memory-rag"
version = "3.10.0"
description = "Optional hybrid FTS5 + vector (semantic) indexer for Markdown vaults"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
# Neural embeddings for true semantic recall (vault_hybrid_search). The default
# embedder is dependency-free; install this extra to upgrade to fastembed/MiniLM.
semantic = ["fastembed>=0.3"]
# Optional embedded-vector acceleration (ADR-0025): pushes the cosine scan into
# SQLite via the sqlite-vec extension. Ranking is identical to the pure-Python
# brute force; it only matters at large-vault scale. Opt in by installing this
# extra AND setting OBSIDIAN_MEMORY_SQLITE_VEC=1. Stays in the same fts.sqlite —
# no server, no separate store (the in-file answer vs. Chroma/LanceDB).
vec = ["sqlite-vec>=0.1.6"]
# Optional cross-encoder reranking (ADR-0026): a final precision pass that re-scores
# the fused candidate passages jointly with the query. Reuses fastembed's ONNX
# TextCrossEncoder (no torch). Opt in by installing this extra AND setting
# OBSIDIAN_MEMORY_RERANK=1 (or passing a reranker). Off by default — the deterministic
# retrieval path is unchanged.
rerank = ["fastembed>=0.3"]

[project.scripts]
obsidian-memory-rag = "obsidian_memory_rag.cli:main"

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
