name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: guard — tag matches every version marker
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          changelog="$(node scripts/version.mjs print)"
          if [ "$tag" != "$changelog" ]; then
            echo "tag v$tag != CHANGELOG latest $changelog" >&2
            exit 1
          fi
          node scripts/version.mjs check
      - name: extract changelog section
        id: changelog
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME#v}"
          awk -v ver="$tag" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog section found for $tag" >&2
            exit 1
          fi
      - name: create release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body_path: release-notes.md
          draft: false
          prerelease: false

  # Publishes the one public package (@vkmikc/create-obsidian-memory) to npm so a
  # tagged release no longer requires a manual `npm publish` (the cause of the
  # 3.5.0/3.6.0 marker drift). Runs only when an NPM_TOKEN secret is configured;
  # the other packages stay private (obsidian-memory-mcp) or pip-only (rag).
  npm-publish:
    needs: publish
    runs-on: ubuntu-latest
    if: ${{ github.repository == 'Vahlame/obsidian-memory-kit' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: publish create-obsidian-memory
        working-directory: packages/create-obsidian-memory
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN not set — skipping publish (configure repo secret to enable)." >&2
            exit 0
          fi
          npm publish --access public
