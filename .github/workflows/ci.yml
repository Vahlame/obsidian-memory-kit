name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# All third-party actions are pinned to a commit SHA (with version comment) to
# guard the supply chain. To bump, resolve the new SHA with:
#   gh api repos/<owner>/<repo>/git/refs/tags/<vN> --jq '.object.sha'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
      - name: install
        run: npm ci
      - name: markdownlint
        run: npx --yes markdownlint-cli "**/*.md" --ignore-path .markdownlintignore
      - name: prettier
        run: npx --yes prettier --check "**/*.{json,yml,yaml,md}"
      - name: es-en parity check
        run: node scripts/check-es-en-parity.mjs
      - name: sync agents
        run: npm run sync-agents:check
      - name: extract and lint embedded PowerShell (legacy prompt)
        shell: pwsh
        run: ./.github/scripts/extract-and-lint.ps1
      - name: validate agent.toml (tomllib)
        run: python -c "import pathlib,tomllib;tomllib.loads(pathlib.Path('agent.toml').read_text(encoding='utf-8'));print('agent.toml ok')"

  test-go:
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - name: go build (unix)
        if: runner.os != 'Windows'
        run: go build -o obsidian-memoryd ./cmd/obsidian-memoryd
      - name: go build (windows)
        if: runner.os == 'Windows'
        run: go build -o obsidian-memoryd.exe ./cmd/obsidian-memoryd
      - name: binary size under 20MB (ubuntu)
        if: matrix.os == 'ubuntu-22.04'
        shell: bash
        run: test $(wc -c < obsidian-memoryd) -lt 20971520

  test-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
      - run: npm ci
      - run: npm test --workspaces --if-present

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: pip install -e ./packages/obsidian-memory-rag
      - run: pytest packages/obsidian-memory-rag/tests

  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        with:
          args: --no-progress --max-redirects 5 .
          fail: true

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mcp-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
      - run: npm ci
      - name: basic-memory MCP handshake (real JSON-RPC, lists tools)
        run: node scripts/mcp-smoke.mjs

  eval-harness-smoke:
    # NOT a model adherence eval. This verifies the eval *harness* runs end-to-end
    # with a deterministic stub provider; the gate is always 1.0 unless the harness
    # itself breaks. Real adherence requires a live LLM + MCP, run promptfoo locally.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
      - run: npm ci
      - name: harness smoke (stub provider, deterministic)
        run: node evals/run-adherence-ci.mjs
