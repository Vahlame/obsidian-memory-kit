name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  markdown:
    name: markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: markdownlint
        run: npx --yes markdownlint-cli "**/*.md" --ignore node_modules

  json:
    name: json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: prettier
        run: npx --yes prettier --check "**/*.json"
      - name: ajv validate manifest
        run: |
          npx --yes ajv-cli@5 validate \
            --spec=draft2020 \
            -s schema.json \
            -d manifest.json \
            --strict=false

  links:
    name: links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-redirects 5 .
          fail: true

  powershell:
    name: powershell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: setup pwsh
        shell: bash
        run: pwsh -v
      - name: extract and lint embedded scripts
        shell: pwsh
        run: ./.github/scripts/extract-and-lint.ps1
